name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  structure-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run site structure tests
        run: python3 tests/homepage_structure_test.py

      - name: Syntax-check JavaScript
        run: |
          node --check js/homepage.js
          node --check three-body-problem-simulation/simulator.js
          python3 - <<'EOF'
          import re, subprocess, sys, tempfile
          from pathlib import Path

          pages = [
              "block-fighter/index.html",
              "jeonse/index.html",
              "retirement-calculator/index.html",
          ]
          for page in pages:
              html = Path(page).read_text(encoding="utf-8")
              scripts = re.findall(r"<script>(.*?)</script>", html, re.S)
              if not scripts:
                  sys.exit(f"{page}: no inline script found")
              for idx, script in enumerate(scripts):
                  with tempfile.NamedTemporaryFile("w", suffix=".js", delete=False) as fh:
                      fh.write(script)
                  subprocess.run(["node", "--check", fh.name], check=True)
              print(f"ok: {page} ({len(scripts)} inline script(s))")
          EOF
