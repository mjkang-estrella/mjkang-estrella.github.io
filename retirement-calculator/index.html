<!DOCTYPE html>
<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retirement Plan Simulator</title>
    <meta name="description" content="Interactive retirement calculator projecting long-term savings growth and monthly income from your age, savings, contributions, and expected return.">
    <meta name="author" content="MJ Kang">
    <link rel="canonical" href="https://mj-kang.com/retirement-calculator/">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Retirement Plan Simulator">
    <meta property="og:description" content="Interactive retirement calculator projecting long-term savings growth and monthly income.">
    <meta property="og:url" content="https://mj-kang.com/retirement-calculator/">
    <meta property="og:image" content="https://mj-kang.com/images/projects/retirement-calculator-thumbnail.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Retirement Plan Simulator">
    <meta name="twitter:description" content="Interactive retirement calculator projecting long-term savings growth and monthly income.">
    <meta name="twitter:image" content="https://mj-kang.com/images/projects/retirement-calculator-thumbnail.jpg">
    <link rel="icon" type="image/png" sizes="32x32" href="/images/logo/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/images/logo/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/images/logo/apple-icon-180x180.png">
    <link rel="manifest" href="/images/logo/manifest.json">
    <meta name="theme-color" content="#0D0D0D">
    <style>
        :root {
            
            --bg-app: #0D0D0D;
            --bg-panel: #111111;
            --border-color: #262626;
            --accent-lime: #CBE656;
            --accent-lime-dim: rgba(203, 230, 86, 0.1);
            --text-primary: #FFFFFF;
            --text-secondary: #888888;
            --text-tertiary: #7A7A7A;


            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --font-size-xs: 11px;
            --font-size-sm: 13px;
            --font-size-md: 15px;
            --font-size-lg: 24px;
            --font-size-xl: 32px;
            
            
            --spacing-unit: 24px;
            --grid-border-width: 1px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-app);
            color: var(--text-primary);
            font-family: var(--font-family);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        
        .layout-grid {
            display: grid;
            grid-template-columns: 320px 1fr;
            grid-template-rows: 60px 1fr 100px;
            height: 100%;
            width: 100%;
            border-top: var(--grid-border-width) solid var(--border-color);
        }

        
        .cell {
            border-right: var(--grid-border-width) solid var(--border-color);
            border-bottom: var(--grid-border-width) solid var(--border-color);
            background-color: var(--bg-panel);
            padding: var(--spacing-unit);
            position: relative;
        }

        
        .header {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 var(--spacing-unit);
        }

        .brand {
            font-size: var(--font-size-xs);
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
        }

        .header-title {
            font-size: var(--font-size-md);
            font-weight: 400;
        }

        .home-link {
            font-size: var(--font-size-xs);
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            text-decoration: none;
        }

        .home-link:focus-visible {
            outline: 2px solid var(--accent-lime);
            outline-offset: 4px;
        }

        @media (hover: hover) {
            .home-link:hover {
                color: var(--text-primary);
            }
        }

        
        .sidebar {
            grid-row: 2 / 3;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 0; 
        }

        .input-group {
            padding: 32px var(--spacing-unit);
            border-bottom: var(--grid-border-width) solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: background-color 0.2s;
        }

        @media (hover: hover) {
            .input-group:hover {
                background-color: #161616;
            }
        }

        .input-label {
            font-size: var(--font-size-sm);
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
        }

        .input-value-display {
            font-size: var(--font-size-lg);
            font-weight: 400;
            margin-bottom: 8px;
            display: flex;
            align-items: baseline;
            gap: 4px;
        }

        .currency-symbol {
            font-size: var(--font-size-md);
            color: var(--text-tertiary);
        }

        
        input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            background: transparent;
            cursor: pointer;
            height: 28px;
            margin-top: 4px;
        }

        input[type=range]:focus {
            outline: none;
        }

        input[type=range]:focus-visible {
            outline: 2px solid var(--accent-lime);
            outline-offset: 6px;
        }

        
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 1px;
            background: var(--text-tertiary);
            border: none;
        }


        input[type=range]::-webkit-slider-thumb {
            height: 12px;
            width: 12px;
            background: var(--bg-app);
            border: 1px solid var(--accent-lime);
            -webkit-appearance: none;
            margin-top: -5.5px;
            border-radius: 0;
        }

        input[type=range]::-moz-range-track {
            width: 100%;
            height: 1px;
            background: var(--text-tertiary);
            border: none;
        }

        input[type=range]::-moz-range-thumb {
            height: 12px;
            width: 12px;
            background: var(--bg-app);
            border: 1px solid var(--accent-lime);
            border-radius: 0;
        }

        @media (hover: hover) {
            input[type=range]:hover::-webkit-slider-thumb {
                background: var(--accent-lime);
            }

            input[type=range]:hover::-moz-range-thumb {
                background: var(--accent-lime);
            }
        }

        @media (pointer: coarse) {
            input[type=range] {
                height: 44px;
            }

            input[type=range]::-webkit-slider-thumb {
                height: 20px;
                width: 20px;
                margin-top: -9.5px;
            }

            input[type=range]::-moz-range-thumb {
                height: 20px;
                width: 20px;
            }
        }

        
        .main-stage {
            grid-column: 2;
            grid-row: 2 / 3;
            display: flex;
            flex-direction: column;
            padding: 40px;
            position: relative;
        }

        .stage-header {
            margin-bottom: 40px;
        }

        .stage-title {
            font-size: var(--font-size-xl);
            font-weight: 400;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .stage-subtitle {
            font-size: var(--font-size-sm);
            color: var(--text-secondary);
            max-width: 400px;
            line-height: 1.5;
        }

        .chart-container {
            flex-grow: 1;
            width: 100%;
            position: relative;
            display: flex;
            align-items: flex-end;
            padding-bottom: 30px; 
            padding-left: 40px; 
        }

        
        .chart-grid {
            position: absolute;
            top: 0;
            left: 40px;
            right: 0;
            bottom: 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 0;
            pointer-events: none;
        }

        .chart-grid-line {
            width: 100%;
            height: 1px;
            background-color: #1F1F1F;
        }

        svg {
            overflow: visible;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .chart-line {
            fill: none;
            stroke: var(--accent-lime);
            stroke-width: 1.5; 
            vector-effect: non-scaling-stroke;
        }

        .chart-area {
            fill: var(--accent-lime-dim);
            stroke: none;
        }

        .axis-label {
            fill: var(--text-tertiary);
            font-size: 10px;
            font-family: var(--font-family);
        }

        
        .geo-marker {
            position: absolute;
            width: 8px;
            height: 8px;
            background: var(--bg-app);
            border: 1px solid var(--accent-lime);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        
        .footer {
            grid-column: 1 / -1;
            grid-row: 3;
            display: flex;
            align-items: center;
        }

        .result-block {
            flex: 1;
            height: 100%;
            border-right: var(--grid-border-width) solid var(--border-color);
            padding: 0 var(--spacing-unit);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .result-label {
            font-size: var(--font-size-xs);
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        
        .icon-square {
            width: 10px;
            height: 10px;
            background-color: var(--accent-lime);
            display: inline-block;
        }
        
        .icon-square-hollow {
            width: 10px;
            height: 10px;
            border: 1px solid var(--accent-lime);
            display: inline-block;
        }

        .result-value {
            font-size: var(--font-size-xl);
            color: var(--text-primary);
        }

        .action-button {
            height: 100%;
            width: 200px;
            background: var(--bg-panel);
            color: var(--text-primary);
            border: none;
            border-right: var(--grid-border-width) solid var(--border-color);
            font-family: var(--font-family);
            font-size: var(--font-size-sm);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition:
                background-color 0.2s,
                color 0.2s,
                border-color 0.2s;
        }

        @media (hover: hover) {
            .action-button:hover {
                background: var(--accent-lime);
                color: var(--bg-app);
            }

            .action-button:hover .icon-square-hollow {
                border-color: var(--bg-app);
            }
        }

        .action-button:focus-visible {
            outline: 2px solid var(--accent-lime);
            outline-offset: -2px;
        }

        
        .wire-icon {
            width: 24px;
            height: 24px;
            border: 1px solid var(--accent-lime);
            position: relative;
        }
        .wire-icon::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 100%;
            width: 8px;
            height: 1px;
            background: var(--accent-lime);
        }

        @media (max-width: 900px) {
            .layout-grid {
                grid-template-columns: 280px 1fr;
            }
        }

        @media (max-width: 720px) {
            body {
                height: auto;
                min-height: 100dvh;
                overflow-y: auto;
            }

            .layout-grid {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto minmax(300px, 42dvh) auto;
                height: auto;
                min-height: 100dvh;
            }

            .cell {
                border-right: none;
            }

            .header {
                min-height: 56px;
                padding: 0 18px;
            }

            .sidebar {
                grid-column: 1;
                grid-row: 2;
            }

            .main-stage {
                grid-column: 1;
                grid-row: 3;
                min-height: 320px;
                padding: 24px 18px;
            }

            .stage-header {
                margin-bottom: 24px;
            }

            .chart-container {
                padding-left: 20px;
                padding-bottom: 24px;
            }

            .chart-grid {
                left: 20px;
                bottom: 24px;
            }

            .footer {
                grid-column: 1;
                grid-row: 4;
                flex-direction: column;
                align-items: stretch;
            }

            .result-block {
                min-height: 88px;
                border-right: none;
                border-bottom: var(--grid-border-width) solid var(--border-color);
                padding: 18px;
            }

            .action-button {
                width: 100%;
                min-height: 72px;
                border-right: none;
            }
        }
    </style>
</head>
<body>

    <div class="layout-grid">
        
        <header class="cell header">
            <div class="brand">FinStruct</div>
            <div class="header-title">Retirement Projector</div>
            <a class="home-link" href="https://mj-kang.com/">mj-kang.com</a>
        </header>

        
        <aside class="sidebar cell">
            <div class="input-group">
                <label class="input-label" for="in-age">Current Age <span>YEARS</span></label>
                <div class="input-value-display" id="disp-age">32</div>
                <input type="range" min="18" max="80" value="32" id="in-age" oninput="updateSim()">
            </div>

            <div class="input-group">
                <label class="input-label" for="in-retire">Retirement Age <span>YEARS</span></label>
                <div class="input-value-display" id="disp-retire">65</div>
                <input type="range" min="40" max="90" value="65" id="in-retire" oninput="updateSim()">
            </div>

            <div class="input-group">
                <label class="input-label" for="in-savings">Current Savings <span>USD</span></label>
                <div class="input-value-display"><span class="currency-symbol">$</span><span id="disp-savings">45,000</span></div>
                <input type="range" min="0" max="500000" step="1000" value="45000" id="in-savings" oninput="updateSim()">
            </div>

            <div class="input-group">
                <label class="input-label" for="in-contrib">Monthly Contribution <span>USD</span></label>
                <div class="input-value-display"><span class="currency-symbol">$</span><span id="disp-contrib">1,200</span></div>
                <input type="range" min="0" max="10000" step="100" value="1200" id="in-contrib" oninput="updateSim()">
            </div>

            <div class="input-group" style="border-bottom: none;">
                <label class="input-label" for="in-rate">Expected Return <span>RATE</span></label>
                <div class="input-value-display" id="disp-rate">7%</div>
                <input type="range" min="1" max="15" step="0.5" value="7" id="in-rate" oninput="updateSim()">
            </div>
        </aside>

        
        <main class="cell main-stage">
            <div class="stage-header">
                <h1 class="stage-title">Investment Trajectory</h1>
                <p class="stage-subtitle">
                    Projected balance from your current savings and monthly contributions. Projection assumes compound annual growth.
                </p>
            </div>

            <div class="chart-container">
                
                <div class="chart-grid">
                    <div class="chart-grid-line"></div>
                    <div class="chart-grid-line"></div>
                    <div class="chart-grid-line"></div>
                    <div class="chart-grid-line"></div>
                    <div class="chart-grid-line"></div>
                </div>

                
                <svg viewBox="0 0 800 400" preserveAspectRatio="none" id="chart-svg">
                    <defs>
                        <linearGradient id="grad1" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style="stop-color:var(--accent-lime);stop-opacity:0.2"></stop>
                            <stop offset="100%" style="stop-color:var(--accent-lime);stop-opacity:0"></stop>
                        </linearGradient>
                    </defs>
                    
                    <path id="chart-area-path" class="chart-area" d=""></path>
                    <path id="chart-line-path" class="chart-line" d=""></path>
                    
                    
                    <text x="0" y="395" class="axis-label" id="start-year">2023</text>
                    <text x="770" y="395" class="axis-label" id="end-year">2056</text>
                </svg>
            </div>
        </main>

        
        <footer class="footer">
            <div class="result-block">
                <div class="result-label"><span class="icon-square"></span> Total Saved</div>
                <div class="result-value" id="res-total" aria-live="polite">$2.4M</div>
            </div>
            <div class="result-block">
                <div class="result-label"><span class="icon-square-hollow"></span> Monthly Income</div>
                <div class="result-value" id="res-income" aria-live="polite">$9,800</div>
            </div>
            <div class="result-block">
                <div class="result-label"><span class="icon-square-hollow"></span> Growth</div>
                <div class="result-value" id="res-growth" aria-live="polite">+420%</div>
            </div>
            <button class="action-button" id="export-report" type="button">
                <span>EXPORT REPORT</span>
                <span class="icon-square-hollow"></span>
            </button>
        </footer>
    </div>

    <script>
        function formatMoney(num) {
            return num.toLocaleString('en-US');
        }

        function formatCurrency(num) {
            return '$' + formatMoney(Math.round(num));
        }

        function formatResultAmount(num) {
            return num >= 1000000
                ? '$' + (num / 1000000).toFixed(2) + 'M'
                : formatCurrency(num);
        }

        function calculate() {
            const currentAge = parseInt(document.getElementById('in-age').value);
            const retireAge = parseInt(document.getElementById('in-retire').value);
            const savings = parseInt(document.getElementById('in-savings').value);
            const monthly = parseInt(document.getElementById('in-contrib').value);
            const rate = parseFloat(document.getElementById('in-rate').value) / 100;

            const years = Math.max(1, retireAge - currentAge);
            const months = years * 12;
            const monthlyRate = rate / 12;

            let balance = savings;
            const dataPoints = [];

            
            const step = Math.max(1, Math.floor(months / 50)); 

            for (let i = 0; i <= months; i++) {
                if (i > 0) {
                    balance = (balance + monthly) * (1 + monthlyRate);
                }
                
                if (i % step === 0 || i === months) {
                    dataPoints.push(balance);
                }
            }

            const contributed = savings + (monthly * months);

            return {
                total: balance,
                monthlyIncome: balance * 0.04 / 12,
                data: dataPoints,
                years: years,
                growth: contributed > 0 ? ((balance - contributed) / contributed) * 100 : 0
            };
        }

        function updateSim() {
            // Keep the horizon coherent: retirement age can never trail current age.
            const ageInput = document.getElementById('in-age');
            const retireInput = document.getElementById('in-retire');
            if (parseInt(retireInput.value) < parseInt(ageInput.value)) {
                retireInput.value = ageInput.value;
            }

            document.getElementById('disp-age').textContent = document.getElementById('in-age').value;
            document.getElementById('disp-retire').textContent = document.getElementById('in-retire').value;
            document.getElementById('disp-savings').textContent = formatMoney(parseInt(document.getElementById('in-savings').value));
            document.getElementById('disp-contrib').textContent = formatMoney(parseInt(document.getElementById('in-contrib').value));
            document.getElementById('disp-rate').textContent = document.getElementById('in-rate').value + '%';

            
            const results = calculate();

            
            document.getElementById('res-total').textContent = formatResultAmount(results.total);
            document.getElementById('res-income').textContent = '$' + formatMoney(Math.round(results.monthlyIncome));
            const growthRounded = Math.round(results.growth);
            document.getElementById('res-growth').textContent = (growthRounded >= 0 ? '+' : '') + growthRounded + '%';


            const currentYear = new Date().getFullYear();
            document.getElementById('start-year').textContent = currentYear;
            document.getElementById('end-year').textContent = currentYear + results.years;

            
            drawChart(results.data);
        }

        function drawChart(data) {
            const svg = document.getElementById('chart-svg');
            const width = 800;
            const height = 400;
            // Floor of 1 keeps the path finite when every point is 0.
            const maxVal = Math.max(1, Math.max(...data)) * 1.1;

            
            let pathD = `M 0 ${height - (data[0] / maxVal * height)}`;
            const xStep = width / (data.length - 1);

            data.forEach((val, index) => {
                if (index === 0) return;
                const x = index * xStep;
                const y = height - (val / maxVal * height);
                
                
                
                pathD += ` L ${x} ${y}`;
            });

            const linePath = document.getElementById('chart-line-path');
            const areaPath = document.getElementById('chart-area-path');

            linePath.setAttribute('d', pathD);
            areaPath.setAttribute('d', pathD + ` L ${width} ${height} L 0 ${height} Z`);
        }

        function exportReport() {
            const currentAge = parseInt(document.getElementById('in-age').value, 10);
            const retireAge = parseInt(document.getElementById('in-retire').value, 10);
            const savings = parseInt(document.getElementById('in-savings').value, 10);
            const monthly = parseInt(document.getElementById('in-contrib').value, 10);
            const rate = parseFloat(document.getElementById('in-rate').value);
            const results = calculate();
            const currentYear = new Date().getFullYear();
            const growthRounded = Math.round(results.growth);
            const reportLines = [
                'Retirement Projection Report',
                `Generated: ${new Date().toLocaleString('en-US', { dateStyle: 'medium', timeStyle: 'short' })}`,
                '',
                'Inputs',
                `Current Age: ${currentAge}`,
                `Retirement Age: ${retireAge}`,
                `Current Savings: ${formatCurrency(savings)}`,
                `Monthly Contribution: ${formatCurrency(monthly)}`,
                `Expected Return: ${rate.toFixed(1)}%`,
                '',
                'Projection',
                `Start Year: ${currentYear}`,
                `Retirement Year: ${currentYear + results.years}`,
                `Projected Savings: ${formatResultAmount(results.total)}`,
                `Estimated Monthly Income (4% rule): ${formatCurrency(results.monthlyIncome)}`,
                `Growth: ${(growthRounded >= 0 ? '+' : '') + growthRounded}%`,
            ];

            const blob = new Blob([reportLines.join('\n')], {
                type: 'text/plain;charset=utf-8',
            });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');

            link.href = url;
            link.download = `retirement-report-${new Date().toISOString().slice(0, 10)}.txt`;
            link.click();

            URL.revokeObjectURL(url);
        }

        document.getElementById('export-report').addEventListener('click', exportReport);
        updateSim();

    </script>

</body></html>
